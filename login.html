<body class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient background element for depth -->
<div class="fixed inset-0 z-0 pointer-events-none bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-surface-container-high/40 via-surface to-surface"></div>
<main class="relative z-10 w-full max-w-[420px]">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/20 p-xl flex flex-col gap-xl">
<!-- Header -->
<div class="flex flex-col items-center text-center gap-base">
<div class="w-12 h-12 bg-primary-container text-on-primary-container rounded-lg flex items-center justify-center mb-base">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">monitoring</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Welcome back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your details to access your dashboard.</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="w-full bg-surface rounded-lg border border-outline-variant pl-[44px] pr-md py-[10px] font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-outline transition-shadow duration-150" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="w-full bg-surface rounded-lg border border-outline-variant pl-[44px] pr-md py-[10px] font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-outline transition-shadow duration-150" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm mt-xs">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest bg-surface cursor-pointer transition-colors duration-150" id="remember-me" name="remember-me" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember-me">Remember me for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-[12px] px-md mt-sm bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-150 shadow-sm active:scale-[0.98]" type="submit">
                    Sign in to account
                </button>
</form>
<!-- Footer Link -->
<div class="text-center pt-md border-t border-outline-variant/20">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors ml-xs" href="#">Register now</a>
</p>
</div>
</div>
</main>
</body></html>
